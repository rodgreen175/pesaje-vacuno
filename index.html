<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pesaje de Vacunos | Registro Ganadero</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #3b6e47 0%, #1f4d2e 100%);
            min-height: 100vh;
            padding: 1.5rem;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .card {
            background: #fef7e8;
            border-radius: 3rem 2rem 3rem 2rem;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: #d9c48b;
            padding: 1.2rem;
            text-align: center;
            border-bottom: 5px solid #a57c3c;
        }

        .header h1 {
            font-size: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            color: #2c4820;
        }

        .peso-area {
            padding: 2rem;
            text-align: center;
        }

        .display-peso {
            background: #2b2a24;
            border-radius: 4rem;
            padding: 1rem;
            margin-bottom: 1.5rem;
        }

        .peso-number {
            font-size: 4rem;
            font-weight: bold;
            color: #f9eec1;
            font-family: monospace;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .btn {
            padding: 12px 20px;
            font-size: 1.2rem;
            border: none;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 0 #8b6942;
            transition: 0.05s linear;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #8b6942;
        }

        .btn-primary {
            background: #6c9e4a;
            color: white;
        }

        .btn-danger {
            background: #ca6f4b;
            color: white;
        }

        .btn-secondary {
            background: #b7a06e;
        }

        .registro {
            background: #ebdfbf;
            margin: 1rem;
            padding: 1rem;
            border-radius: 2rem;
        }

        .registro h3 {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .lista-registro {
            max-height: 250px;
            overflow-y: auto;
            list-style: none;
        }

        .lista-registro li {
            background: white;
            margin: 6px 0;
            padding: 8px 12px;
            border-radius: 40px;
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
        }

        .vacuno-icon {
            font-size: 1.2rem;
        }

        .btn-reset {
            background: #a5834e;
            color: white;
            margin-top: 8px;
            width: 100%;
        }

        .footer {
            text-align: center;
            font-size: 0.7rem;
            padding: 1rem;
            color: #7f673f;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <div class="header">
            <h1>
                🐄 Pesaje de Vacunos
                <span>🐂</span>
            </h1>
            <p>Registro de kilos por animal</p>
        </div>

        <div class="peso-area">
            <div class="display-peso">
                <div class="peso-number" id="pesoActual">0</div>
                <div style="color:#ddd;">kg</div>
            </div>

            <div class="btn-group">
                <button class="btn btn-primary" id="mas10">+10 kg</button>
                <button class="btn btn-primary" id="mas1">+1 kg</button>
                <button class="btn btn-danger" id="menos1">-1 kg</button>
                <button class="btn btn-danger" id="menos10">-10 kg</button>
            </div>

            <div class="btn-group">
                <button class="btn btn-secondary" id="guardarPeso">💾 Guardar peso actual</button>
                <button class="btn btn-danger" id="reiniciarPeso">🔄 Reiniciar a 0 kg</button>
            </div>
        </div>

        <div class="registro">
            <h3>📋 Últimos pesajes registrados</h3>
            <ul class="lista-registro" id="listaPesajes">
                <li style="justify-content:center; color:#7f6b3a;">✨ Aún sin registros ✨</li>
            </ul>
            <button class="btn btn-reset" id="borrarHistorial">🗑️ Borrar historial de pesajes</button>
        </div>

        <div class="footer">
            🧾 Cada guardado registra el peso actual | Ideal para control ganadero
        </div>
    </div>
</div>

<script>
    let pesoActual = 0;
    let historialPesajes = [];

    const pesoActualSpan = document.getElementById('pesoActual');
    const listaPesajesUl = document.getElementById('listaPesajes');

    function cargarDatos() {
        const guardado = localStorage.getItem('pesaje_vacunos');
        if (guardado) {
            try {
                const data = JSON.parse(guardado);
                pesoActual = data.pesoActual || 0;
                historialPesajes = data.historialPesajes || [];
            } catch(e) {}
        }
        actualizarPantalla();
        mostrarHistorial();
    }

    function guardarDatos() {
        const datos = {
            pesoActual: pesoActual,
            historialPesajes: historialPesajes
        };
        localStorage.setItem('pesaje_vacunos', JSON.stringify(datos));
    }

    function actualizarPantalla() {
        pesoActualSpan.innerText = pesoActual;
    }

    function mostrarHistorial() {
        listaPesajesUl.innerHTML = '';
        if (historialPesajes.length === 0) {
            listaPesajesUl.innerHTML = '<li style="justify-content:center; color:#7f6b3a;">🐄 No hay pesajes guardados aún</li>';
            return;
        }
        const ultimos = [...historialPesajes].reverse().slice(0, 15);
        ultimos.forEach(item => {
            const li = document.createElement('li');
            li.innerHTML = `<span>🐂 ${item.fecha}</span><span><strong>${item.peso} kg</strong></span>`;
            listaPesajesUl.appendChild(li);
        });
    }

    function guardarPesoActual() {
        const ahora = new Date();
        const fechaStr = `${ahora.toLocaleDateString()} ${ahora.toLocaleTimeString()}`;
        historialPesajes.push({
            fecha: fechaStr,
            peso: pesoActual,
            timestamp: ahora.getTime()
        });
        if (historialPesajes.length > 50) {
            historialPesajes = historialPesajes.slice(-50);
        }
        guardarDatos();
        mostrarHistorial();
        const msg = document.createElement('div');
        msg.innerText = `✅ Peso ${pesoActual} kg guardado`;
        msg.style.position = 'fixed';
        msg.style.bottom = '20px';
        msg.style.left = '50%';
        msg.style.transform = 'translateX(-50%)';
        msg.style.backgroundColor = '#2e5c35';
        msg.style.color = 'white';
        msg.style.padding = '8px 20px';
        msg.style.borderRadius = '40px';
        msg.style.zIndex = '999';
        document.body.appendChild(msg);
        setTimeout(() => msg.remove(), 1500);
    }

    function modificarPeso(cambio) {
        let nuevoPeso = pesoActual + cambio;
        if (nuevoPeso < 0) nuevoPeso = 0;
        pesoActual = nuevoPeso;
        actualizarPantalla();
        guardarDatos();
    }

    function reiniciarPesoCero() {
        if (pesoActual === 0) {
            const msg = document.createElement('div');
            msg.innerText = '⚠️ Ya está en 0 kg';
            msg.style.cssText = 'position:fixed; bottom:70px; left:50%; transform:translateX(-50%); background:#a55233; color:white; padding:6px 16px; border-radius:30px; z-index:1000;';
            document.body.appendChild(msg);
            setTimeout(() => msg.remove(), 1200);
            return;
        }
        pesoActual = 0;
        actualizarPantalla();
        guardarDatos();
    }

    function borrarTodoHistorial() {
        if (historialPesajes.length === 0) return;
        historialPesajes = [];
        guardarDatos();
        mostrarHistorial();
        const msg = document.createElement('div');
        msg.innerText = '📋 Historial de pesajes borrado';
        msg.style.cssText = 'position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#604e2c; color:#f9eec1; padding:5px 18px; border-radius:40px; z-index:1000;';
        document.body.appendChild(msg);
        setTimeout(() => msg.remove(), 1500);
    }

    document.getElementById('mas10').addEventListener('click', () => modificarPeso(10));
    document.getElementById('mas1').addEventListener('click', () => modificarPeso(1));
    document.getElementById('menos1').addEventListener('click', () => modificarPeso(-1));
    document.getElementById('menos10').addEventListener('click', () => modificarPeso(-10));
    document.getElementById('guardarPeso').addEventListener('click', guardarPesoActual);
    document.getElementById('reiniciarPeso').addEventListener('click', reiniciarPesoCero);
    document.getElementById('borrarHistorial').addEventListener('click', borrarTodoHistorial);

    cargarDatos();
</script>
</body>
</html>
